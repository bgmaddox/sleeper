services:
  - type: web
    name: legacy-league
    runtime: python
    rootDir: webapp
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: LEAGUE_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: cache
      mountPath: /opt/render/project/src/FirstPyProject/.cache
      sizeGB: 1
